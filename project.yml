name: Parla
options:
  bundleIdPrefix: com.parla
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Parla:
    type: application
    platform: iOS
    sources:
      - path: Parla
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    info:
      path: Parla/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Parla necesita el microfono para transcribir tu voz"
        NSSpeechRecognitionUsageDescription: "Parla usa reconocimiento de voz para convertir audio a texto"
        CFBundleDisplayName: Parla
        UILaunchScreen:
          UIColorName: SplashBackground
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parla.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
